{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 text-center">
        <div class="card">
            <div class="card-body">
                <h1 class="card-title display-1">{{ visits }}</h1>
                <p class="card-text">
                    {% if visits == 1 %}
                        Это ваш первый визит на эту страницу!
                    {% else %}
                        Вы посетили эту страницу {{ visits }} раз.
                    {% endif %}
                </p>
                <a href="{{ url_for('index') }}" class="btn btn-primary">На главную</a>
            </div>
            <div class="card-footer text-muted">
                Счётчик хранится в вашей сессии (session['visits'])
            </div>
        </div>
    </div>
</div>
{% endblock %}
