{% extends "base.html" %}

{% block content %}
<h1>Статистика по страницам</h1>
<div class="table-responsive">
    <table class="table table-striped">
        <thead><tr><th>№</th><th>Страница</th><th>Количество посещений</th></tr></thead>
        <tbody>
            {% for row in stats %}
            <tr>
                <td>{{ loop.index }}</td>
                <td>{{ row[0] }}</td>
                <td>{{ row[1] }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
<a href="{{ url_for('reports.export_csv', type='pages') }}" class="btn btn-success">Экспорт в CSV</a>
<a href="{{ url_for('reports.index') }}" class="btn btn-secondary">Назад</a>
{% endblock %}
