{% extends "base.html" %}

{% block content %}
<div class="container mt-5" style="max-width: 450px;">
    <div class="card shadow-lg border-0 rounded-4">
        <div class="card-header bg-primary text-white text-center py-3">
            <h3 class="mb-0">Вход в систему</h3>
        </div>
        <div class="card-body p-4">
            <form method="POST">
                <div class="mb-3">
                    <label for="login" class="form-label fw-semibold">Логин</label>
                    <input type="text" class="form-control" id="login" name="login" required autofocus>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label fw-semibold">Пароль</label>
                    <input type="password" class="form-control" id="password" name="password" required>
                </div>
                <div class="mb-4 form-check">
                    <input type="checkbox" class="form-check-input" id="remember" name="remember">
                    <label class="form-check-label" for="remember">Запомнить меня</label>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Войти</button>
            </form>
        </div>
        <div class="card-footer text-center bg-light">
            <small class="text-muted">
                Тестовые учётные данные: <strong>admin</strong> / <strong>Admin123!</strong>
            </small>
        </div>
    </div>
</div>
{% endblock %}
