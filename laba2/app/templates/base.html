<!doctype html>
<html lang="ru">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">

  <title>
    {% if title %}
    {{ title }}
    {% else %}
    Лабораторная работа №2
    {% endif %}
  </title>
</head>

<body>
  <header>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="{{ url_for('index') }}">Лабораторная работа № 2</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
          aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav ms-auto mb-2 mb-lg-0">

            <!-- Главная -->
            <li class="nav-item">
              <a class="nav-link" href="{{ url_for('index') }}">Главная</a>
            </li>

            <!-- Об авторе -->
            <li class="nav-item">
              <a class="nav-link" href="{{ url_for('about') }}">Об авторе</a>
            </li>

            <!-- Выпадающее меню "Запрос" -->
            <li class="nav-item dropdown">
              <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button"
                 data-bs-toggle="dropdown" aria-expanded="false">
                Запрос
              </a>
              <ul class="dropdown-menu" aria-labelledby="navbarDropdown">
                <li><a class="dropdown-item" href="{{ url_for('url_params') }}?param1=value1&param2=value2">Параметры URL</a></li>
                <li><a class="dropdown-item" href="{{ url_for('headers') }}">Заголовки запроса</a></li>
                <li><a class="dropdown-item" href="{{ url_for('cookie') }}">Cookie</a></li>
                <li><a class="dropdown-item" href="{{ url_for('form_params') }}">Параметры формы</a></li>
              </ul>
            </li>

            <!-- Валидатор номера -->
            <li class="nav-item">
              <a class="nav-link" href="{{ url_for('phone_validator') }}">Валидатор номера</a>
            </li>

          </ul>
        </div>
      </div>
    </nav>
  </header>

  <main class="my-3">
    <div class="container">
      {% block content %}
      <h1>Содержимое по умолчанию</h1>
      {% endblock %}
    </div>
  </main>

  <footer class="footer mt-auto py-3 bg-light">
    <div class="container text-center">
      <span class="text-muted">Казарян Мария Арсеновна, Группа: 241-372.</span>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
    crossorigin="anonymous"></script>

</body>

</html>
