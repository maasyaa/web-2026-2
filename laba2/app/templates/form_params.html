{% extends 'base.html' %}

{% block content %}
<h1 class="my-5">Параметры формы</h1>

<form method="post" class="mb-4">
    <div class="mb-3">
        <label for="nameInput" class="form-label">Имя</label>
        <input type="text" name="name" class="form-control" id="nameInput" placeholder="Введите имя">
    </div>
    <div class="mb-3">
        <label for="emailInput" class="form-label">Email</label>
        <input type="email" name="email" class="form-control" id="emailInput" placeholder="Введите email">
    </div>
    <button type="submit" class="btn btn-primary">Отправить</button>
</form>

<h3>Отправленные данные:</h3>
{% if form_data %}
    <table class="table">
        <thead>
            <tr>
                <th>Поле</th>
                <th>Значение</th>
            </tr>
        </thead>
        <tbody>
            {% for key, value in form_data.items() %}
            <tr>
                <td>{{ key }}</td>
                <td>{{ value }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
{% else %}
    <p>Данные еще не отправлены.</p>
{% endif %}
{% endblock %}
